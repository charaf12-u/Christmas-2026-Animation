<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year 2026 | Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Stars Background -->
    <div id="stars-container"></div>

    <!-- 3D Tree & Snow Canvas -->
    <canvas id="scene-canvas"></canvas>

    <!-- Overlay UI -->
    <div class="ui-layer">
        <div id="countdown-wrapper">
            <div id="timer-display">
                <div class="time-block">
                    <span id="d">00</span>
                    <label>Days</label>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span id="h">00</span>
                    <label>Hours</label>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span id="m">00</span>
                    <label>Minutes</label>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span id="s">00</span>
                    <label>Seconds</label>
                </div>
            </div>
        </div>

        <div id="final-message" class="hidden">
            <h1 class="main-title">Happy New Year</h1>
            <h2 class="sub-title">2026</h2>
        </div>
    </div>

    <!-- Fireworks Overlay (only active at end) -->
    <canvas id="fireworks-canvas"></canvas>

    <script src="script.js"></script>
</body>

</html>
